<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Elements</title>
    <link rel="stylesheet" href="styles.css">
</head>     
<body>
    <h1>Form Elements</h1>
    

    <form>
        <label for="email">Enter Your Email:</label>
        <input type="email" size="20px" maxlength="20" id="email" name="email" placeholder="Enter your email" required>
        <br><br>

        <label for="password">Password:</label>
        <input type="password" size="20px" maxlength="20" id="password" name="password" placeholder="Enter your password" required>
        <br><br><br><br>

        <label>Gender:</label>
        <br><br>
        <label for="maleradio">Male</label>
        <input type="radio" id="maleradio" value="male" name="gender">
        <label for="femaleradio">Female</label>
        <input type="radio" id="femaleradio"  value="female" name="gender">
        <label for="other">Other</label>
        <input type="radio" id="other" value="other" name="gender">
        <br><br><br><br><br>

        <label for="dob">Date of BIRTH:</label>
        <input type="date" id="dob" name="dob" required>

        <br><br><br><br>

        <label for="age">AGE:</label>
        <input type="number" id="age" name="age" min="18" max="35" placeholder="Enter your age" required>
        <br><br><br><br>

        <label for="url">Enter Your GITHUB URL:</label>
        <input type="url" id="url" name="url" placeholder="Enter your URL" required>
        <br><br><br><br>
        <label>Programming Language:</label>
        <br><br>

        <label for="c">C     </label>
        <input type="checkbox" id="c" value="c" name="language">
        <br>
        <label for="python">Python</label>
        <input type="checkbox" id="python"  value="python" name="language">

        <br><br><br><br>
        <label for="comment">Enter Comment Below:</label>
        <br><br>
        <textarea id="comment" name="comment" rows="4" cols="50" placeholder="Enter your comment here..."></textarea>

  

        <br><br><br><br>
        <label for="stack">select your stack:</label>
        <select id="stack" name="stack">
            <option value="none">None</option>
            <option value="frontend">Frontend</option>
            <option value="backend">Backend</option>
            <option value="fullstack">Full Stack</option>
        </select>

        <br><br><br><br>
        
        <button type="reset">Reset</button>
        <button type="submit">Submit</button>

       
    </form>
    
</body>



</html>
