<!DOCTYPE html>


<html lang="en">    

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Form Validation</h1>

    <form>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
        <br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" minlength="8" placeholder="Enter your password" required>
        <br><br><br><br>

        <br><br><br><br><br>

        <label for="dob">Date of BIRTH:</label>
        <input type="date" id="dob" name="dob" required>

        <br><br><br><br>

        <label for="age">AGE:</label>
        <input type="number" id="age" name="age" min="18" max="35" placeholder="Enter your age" required>
        <br><br><br><br>

        <label for="url">Enter Your GITHUB URL:</label>
        <input type="url" id="url" name="url" placeholder="Enter your URL" required>
        <br><br><br><br>
        <label>Programming Language:</label>
        <br><br>
        
        <button type="reset">Reset</button>
        <button type="submit">Submit</button>
    </form>
</html>
