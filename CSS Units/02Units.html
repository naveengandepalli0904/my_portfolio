<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            color: rgb(48, 29, 223);
            display: block;
            visibility: visible;
        }
        img{
            position: absolute;
            top: 20px;
            height: 300px;
            top: 20px;
            z-index: -1;
        }
    </style>
</head>
<body>
    <h1>CSS Units</h1>
    <h1>Relative Units</h1>
    <h1>Absolute Units</h1>
    <h1>Font-relative Units</h1>
    <img src="IMAGE.png" alt="Image" height="200px">
    <h1>Viewport-relative Units</h1>
    <br><br><br>
    <img style="float: right;" src="IMAGE.png" alt="Image">
    <h1>Viewport-relative Units</h1>
</body>

</body>
</html>
